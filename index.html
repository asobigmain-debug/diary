<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#8b1a0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="マイノート">
<title>マイノート</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f3eb;
    --cream-dark: #ede8dc;
    --cream-border: #d0c8b4;
    --shu: #c0392b;
    --shu-light: #e05c4a;
    --shu-dark: #8b1a0e;
    --shu-pale: #fdf0ee;
    --ink: #2a2a2a;
    --ink-light: #666;
    --red-accent: #8b3a3a;
    --gold: #a07820;
    --shadow: rgba(80,40,30,0.12);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 14px;
    display: flex;
    flex-direction: column;
  }

  /* ===== ヘッダー ===== */
  .app-header {
    background: var(--shu-dark);
    padding: calc(10px + var(--safe-top)) 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 2px 8px var(--shadow);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-row1 {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-row2 {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .app-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 19px;
    font-weight: 800;
    color: var(--cream);
    letter-spacing: 0.12em;
    white-space: nowrap;
    cursor: pointer;
    border-bottom: 1.5px dashed rgba(255,255,255,0.35);
    padding-bottom: 1px;
  }
  .app-title-input {
    font-family: 'Shippori Mincho', serif;
    font-size: 19px;
    font-weight: 800;
    color: var(--cream);
    letter-spacing: 0.12em;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 4px;
    padding: 2px 8px;
    outline: none;
    min-width: 100px;
  }
  .search-wrap {
    display: flex;
    gap: 5px;
    flex: 1;
  }
  .search-input {
    flex: 1;
    padding: 7px 10px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    background: rgba(255,255,255,0.12);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    color: white;
    outline: none;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.5); }
  .btn-header {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.35);
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-header:active { background: rgba(255,255,255,0.28); }

  /* ===== タブバー ===== */
  .tabs-bar {
    background: var(--cream-dark);
    border-bottom: 2px solid var(--cream-border);
    display: flex;
    align-items: flex-end;
    overflow-x: auto;
    padding: 0 12px;
    gap: 2px;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 9px 14px 8px;
    border: 1.5px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: transparent;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    color: var(--ink-light);
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: -2px;
    transition: background 0.14s;
  }
  .tab-btn.active {
    background: var(--cream);
    border-color: var(--cream-border);
    color: var(--shu-dark);
    font-weight: 700;
  }
  .tab-edit-icon {
    font-size: 10px;
    opacity: 0;
    background: none; border: none; cursor: pointer;
    color: var(--ink-light); padding: 1px 3px; border-radius: 2px;
  }
  .tab-btn.active .tab-edit-icon { opacity: 1; }
  .tab-add-btn {
    padding: 8px 12px;
    background: transparent; border: none;
    color: var(--shu); font-size: 18px;
    cursor: pointer; flex-shrink: 0;
    border-radius: 4px; margin-bottom: 2px;
  }

  /* ===== スクロールエリア ===== */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 14px;
    padding-bottom: calc(12px + var(--safe-bottom));
  }

  /* ===== 追加フォーム ===== */
  .add-form {
    background: white;
    border: 1.5px solid var(--cream-border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .add-form-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .form-input {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--cream-border);
    border-radius: 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    transition: border-color 0.16s;
  }
  .form-input:focus { border-color: var(--shu-light); background: white; }
  .form-input-title { max-width: 120px; flex-shrink: 0; }
  .form-textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--cream-border);
    border-radius: 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    resize: none;
    overflow: hidden;
    min-height: 36px;
    transition: border-color 0.16s;
  }
  .form-textarea:focus { border-color: var(--shu-light); background: white; }
  .btn-add {
    background: var(--shu);
    color: white;
    padding: 8px 14px;
    border: none; border-radius: 4px;
    cursor: pointer; font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; font-weight: 500;
    transition: background 0.16s; white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-add:active { background: var(--shu-dark); }

  /* ===== 列ヘッダー ===== */
  .list-header {
    display: grid;
    grid-template-columns: 110px 1fr 72px 44px;
    gap: 6px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--ink-light);
    font-weight: 500;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  /* ===== アイテム行 ===== */
  .item-row {
    display: grid;
    grid-template-columns: 110px 1fr 72px 44px;
    gap: 6px;
    align-items: start;
    background: white;
    border: 1.5px solid var(--cream-border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
    box-shadow: 0 1px 3px var(--shadow);
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cell-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--shu-dark);
    word-break: break-all;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .tab-badge {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 10px;
    background: var(--shu-pale);
    color: var(--shu-dark);
    border-radius: 3px;
    padding: 1px 5px;
    font-weight: 400;
    display: inline-block;
    align-self: flex-start;
  }

  .cell-content {
    font-size: 12px;
    color: var(--ink-light);
    word-break: break-all;
    line-height: 1.45;
    min-width: 0;
  }
  .cell-content-inner {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .cell-content-inner.expanded { display: block; }
  .expand-btn {
    font-size: 10px; color: var(--shu);
    background: none; border: none; cursor: pointer; padding: 0;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  .cell-copy { display: flex; justify-content: center; padding-top: 1px; }
  .copy-btn {
    padding: 5px 0; background: var(--shu); color: white;
    border: none; border-radius: 4px; cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px; font-weight: 500;
    width: 64px; text-align: center;
    transition: background 0.14s;
  }
  .copy-btn:active { background: var(--shu-dark); }
  .copy-btn.copied { background: var(--gold); }

  .cell-actions {
    display: flex; flex-direction: column; gap: 3px;
    align-items: center; padding-top: 1px;
  }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    font-size: 14px; padding: 3px 4px; border-radius: 3px;
    color: var(--ink-light); line-height: 1;
  }
  .icon-btn.del:active { color: #8b3a3a; }

  /* 編集行 */
  .item-row.editing { display: block; background: var(--shu-pale); border-color: var(--shu-light); }
  .edit-form { display: flex; flex-direction: column; gap: 6px; }
  .edit-input {
    width: 100%; padding: 7px 10px;
    border: 1.5px solid var(--cream-border); border-radius: 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px;
    background: white; outline: none; resize: vertical;
  }
  .edit-input:focus { border-color: var(--shu-light); }
  .edit-input-title { font-family: 'Shippori Mincho', serif; font-weight: 600; color: var(--shu-dark); }
  .edit-input-content { min-height: 70px; }
  .edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .btn-save {
    background: var(--shu); color: white; padding: 6px 14px;
    border: none; border-radius: 4px; cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px;
  }
  .btn-cancel {
    background: transparent; color: var(--ink-light);
    border: 1.5px solid var(--cream-border); padding: 6px 12px;
    border-radius: 4px; cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px;
  }

  /* 空状態 */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--ink-light); }
  .empty-icon { font-size: 30px; margin-bottom: 10px; }
  .empty-text { font-family: 'Shippori Mincho', serif; font-size: 15px; margin-bottom: 4px; }
  .empty-sub { font-size: 12px; color: #aaa; }

  .loading { text-align: center; padding: 32px; color: var(--ink-light); font-family: 'Shippori Mincho', serif; }

  /* ===== ドラッグソート ===== */
  .tab-btn[draggable="true"] { cursor: grab; }
  .tab-btn.drag-over-left  { border-left:  3px solid var(--shu-light) !important; }
  .tab-btn.drag-over-right { border-right: 3px solid var(--shu-light) !important; }

  .drag-handle {
    position: absolute; left: -2px; top: 50%; transform: translateY(-50%);
    color: var(--cream-border); font-size: 13px; cursor: grab;
    padding: 4px 3px; line-height: 1; user-select: none;
    opacity: 1;
    transition: opacity 0.14s;
  }
  @media (hover: hover) {
    .drag-handle { opacity: 0; }
    .item-row:hover .drag-handle { opacity: 1; }
  }
  .item-row { position: relative; }
  .item-row.dragging { opacity: 0.4; }
  .item-row.drag-over-top    { border-top:    2px solid var(--shu) !important; }
  .item-row.drag-over-bottom { border-bottom: 2px solid var(--shu) !important; }

  /* ===== モーダル ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--cream);
    border: 2px solid var(--cream-border);
    border-radius: 10px;
    padding: 22px 24px;
    width: 100%; max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px; font-weight: 700;
    color: var(--shu-dark); margin-bottom: 12px;
  }
  .modal-note { font-size: 11px; color: var(--ink-light); margin-bottom: 10px; line-height: 1.5; }
  .modal-input {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--cream-border); border-radius: 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 14px;
    background: white; outline: none; margin-bottom: 12px;
  }
  .modal-input:focus { border-color: var(--shu-light); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
  .btn-ghost {
    background: transparent; color: var(--ink-light);
    border: 1.5px solid var(--cream-border);
    padding: 7px 14px; border-radius: 4px; cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px;
  }
  .btn-danger {
    background: transparent; color: var(--red-accent);
    border: 1.5px solid var(--red-accent);
    padding: 7px 12px; border-radius: 4px; cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px;
    margin-right: auto;
  }
  .btn-full {
    width: 100%; padding: 11px 0; margin-bottom: 8px;
    background: var(--shu); color: white;
    border: none; border-radius: 6px; cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; font-weight: 500; text-align: center;
  }
  .btn-full:active { background: var(--shu-dark); }
  .btn-full.outline {
    background: white; color: var(--shu);
    border: 1.5px solid var(--shu);
  }

  /* ===== トースト ===== */
  .toast {
    position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--shu-dark); color: white;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; opacity: 0;
    transition: all 0.22s; z-index: 300; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-row1">
    <span class="app-title" id="appTitle" onclick="startEditTitle()">マイノート</span>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="検索…" oninput="onSearchInput()">
    </div>
  </div>
  <div class="header-row2">
    <button class="btn-header" onclick="openModal('exportModal')">📄 書き出し</button>
    <button class="btn-header" onclick="openModal('importModal')">📥 読み込み</button>
  </div>
</header>

<div class="tabs-bar" id="tabsBar"></div>

<div class="scroll-area" id="scrollArea">
  <div class="add-form" id="addForm">
    <div class="add-form-row">
      <input class="form-input form-input-title" id="newTitle" type="text" placeholder="タイトル">
      <button class="btn-add" onclick="addItem()">追加</button>
    </div>
    <textarea class="form-textarea" id="newContent" placeholder="内容（URL・テキストなど）" rows="1" oninput="autoResize(this)"></textarea>
  </div>

  <div class="list-header" id="listHeader" style="display:none;">
    <div>タイトル</div><div>内容</div><div style="text-align:center;">コピー</div><div></div>
  </div>
  <div id="itemsList"><div class="loading">読み込み中…</div></div>
</div>

<!-- タブ追加 -->
<div class="modal-overlay" id="addTabModal">
  <div class="modal">
    <div class="modal-title">タブを追加</div>
    <input class="modal-input" id="newTabName" type="text" placeholder="タブ名" onkeydown="if(event.key==='Enter')confirmAddTab()">
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal('addTabModal')">キャンセル</button>
      <button class="btn-add" onclick="confirmAddTab()">追加</button>
    </div>
  </div>
</div>

<!-- タブ編集 -->
<div class="modal-overlay" id="editTabModal">
  <div class="modal">
    <div class="modal-title">タブを編集</div>
    <input class="modal-input" id="editTabInput" type="text" onkeydown="if(event.key==='Enter')confirmRenameTab()">
    <div class="modal-btns">
      <button class="btn-danger" onclick="confirmDeleteTab()">削除</button>
      <button class="btn-ghost" onclick="closeModal('editTabModal')">キャンセル</button>
      <button class="btn-add" onclick="confirmRenameTab()">変更</button>
    </div>
  </div>
</div>

<!-- エクスポート -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title">データを書き出す</div>
    <p class="modal-note">全タブのデータをファイルに保存します</p>
    <button class="btn-full" onclick="doExportJson()">📄 JSON形式で書き出す</button>
    <button class="btn-full outline" onclick="doExportCsv()">📊 CSV形式で書き出す</button>
    <div class="modal-btns"><button class="btn-ghost" onclick="closeModal('exportModal')">閉じる</button></div>
  </div>
</div>

<!-- インポート -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">データを読み込む</div>
    <p class="modal-note">※ 既存データに追記されます。上書きではありません。<br>JSON形式またはCSV形式（タブ,タイトル,内容）に対応。</p>
    <input type="file" id="importFile" accept=".json,.csv" style="width:100%;font-size:13px;margin-bottom:12px;">
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal('importModal')">キャンセル</button>
      <button class="btn-add" onclick="doImport()">読み込む</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== IndexedDB =====
const DB_NAME = 'CopipeDB', DB_VER = 1;
const STORE = 'items', META_STORE = 'meta';
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const s = d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        s.createIndex('tab', 'tab', { unique: false });
      }
      if (!d.objectStoreNames.contains(META_STORE)) {
        d.createObjectStore(META_STORE, { keyPath: 'key' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => {
      // DBが壊れている場合は削除して再作成
      console.warn('IndexedDB open failed, trying to delete and recreate...');
      const delReq = indexedDB.deleteDatabase(DB_NAME);
      delReq.onsuccess = () => {
        const retryReq = indexedDB.open(DB_NAME, DB_VER);
        retryReq.onupgradeneeded = e => {
          const d = e.target.result;
          const s = d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
          s.createIndex('tab', 'tab', { unique: false });
          d.createObjectStore(META_STORE, { keyPath: 'key' });
        };
        retryReq.onsuccess = e => { db = e.target.result; resolve(db); };
        retryReq.onerror = () => reject(retryReq.error);
      };
      delReq.onerror = () => reject(req.error);
    };
    req.onblocked = () => {
      // 他のタブが同じDBを開いている場合
      console.warn('IndexedDB blocked');
      reject(new Error('DBがブロックされています。他のタブを閉じてください。'));
    };
  });
}

function tx(stores, mode = 'readonly') {
  return db.transaction(stores, mode);
}

function getAllItems(tabName) {
  return new Promise((resolve, reject) => {
    const t = tx(STORE);
    const req = t.objectStore(STORE).index('tab').getAll(tabName);
    req.onsuccess = () => {
      const result = req.result.sort((a, b) => {
        if (a.sortOrder !== undefined && b.sortOrder !== undefined) return a.sortOrder - b.sortOrder;
        return a.id - b.id;
      });
      resolve(result);
    };
    req.onerror = () => reject(req.error);
  });
}

function saveItemOrder(list) {
  return new Promise((resolve, reject) => {
    const t = db.transaction(STORE, 'readwrite');
    const store = t.objectStore(STORE);
    let done = 0;
    list.forEach((item, idx) => {
      const get = store.get(item.id);
      get.onsuccess = () => {
        const rec = get.result;
        rec.sortOrder = idx;
        store.put(rec);
        if (++done === list.length) resolve();
      };
      get.onerror = () => reject(get.error);
    });
    if (!list.length) resolve();
  });
}

function getAllItemsAll() {
  return new Promise((resolve, reject) => {
    const req = tx(STORE).objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result.sort((a, b) => a.id - b.id));
    req.onerror = () => reject(req.error);
  });
}

function addItemDB(tabName, title, content) {
  return new Promise((resolve, reject) => {
    const t = tx(STORE, 'readwrite');
    const req = t.objectStore(STORE).add({ tab: tabName, title, content });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function updateItemDB(id, title, content) {
  return new Promise((resolve, reject) => {
    const store = tx(STORE, 'readwrite').objectStore(STORE);
    const get = store.get(id);
    get.onsuccess = () => {
      const item = get.result;
      item.title = title; item.content = content;
      const put = store.put(item);
      put.onsuccess = () => resolve();
      put.onerror = () => reject(put.error);
    };
    get.onerror = () => reject(get.error);
  });
}

function deleteItemDB(id) {
  return new Promise((resolve, reject) => {
    const req = tx(STORE, 'readwrite').objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// タブ一覧（メタストア）
function getTabsDB() {
  return new Promise((resolve, reject) => {
    log('META_STOREアクセス中…');
    let t;
    try { t = tx(META_STORE); } catch(e) { reject(e); return; }
    const req = t.objectStore(META_STORE).get('tabs');
    req.onsuccess = () => resolve(req.result ? req.result.value : []);
    req.onerror = () => reject(req.error);
  });
}

function saveTabsDB(tabsArr) {
  return new Promise((resolve, reject) => {
    const req = tx(META_STORE, 'readwrite').objectStore(META_STORE).put({ key: 'tabs', value: tabsArr });
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

let isSearching = false, searchResults = [];

    expBtn.className = 'expand-btn'; expBtn.textContent = '▼ もっと見る';
    expBtn.onclick = () => {
      const exp = inner.classList.toggle('expanded');
      expBtn.textContent = exp ? '▲ 折りたたむ' : '▼ もっと見る';

  cellCp.className = 'cell-copy';

    const cpBtn = document.createElement('button');
    cpBtn.className = 'copy-btn'; cpBtn.id = `cp-${item.id}`;
    cpBtn.textContent = 'コピー';

function doCopy(id, content) {
  const btn = document.getElementById(`cp-${id}`);
  const done = () => {
    if (btn) { btn.textContent = '済 ✓'; btn.classList.add('copied'); }
    setTimeout(() => { if (btn) { btn.textContent = 'コピー'; btn.classList.remove('copied'); } }, 1800);
    showToast('コピーしました');
  };
  navigator.clipboard.writeText(content || '').then(done).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = content || ''; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); done();
  });
}

async function confirmRenameTab() {

  if (!newName || newName === renamingTab) { closeModal('editTabModal'); return; }
  if (tabs.includes(newName)) { showToast('同じ名前のタブがすでにあります'); return; }
  // DBのアイテムのタブ名も更新
  const allItems = await getAllItemsAll();
  const t = db.transaction(STORE, 'readwrite');
  const store = t.objectStore(STORE);
  await Promise.all(allItems.filter(i => i.tab === renamingTab).map(i => {

  const idx = tabs.indexOf(renamingTab);

async function confirmDeleteTab() {

  const allItems = await getAllItemsAll();
  const t = db.transaction(STORE, 'readwrite');
  const store = t.objectStore(STORE);

    new Promise((res, rej) => { const r = store.delete(i.id); r.onsuccess = res; r.onerror = rej; })

// ===== インポート =====
async function doImport() {
  const file = document.getElementById('importFile').files[0];
  if (!file) { showToast('ファイルを選んでください'); return; }
  const text = await file.text();
  const ext = file.name.split('.').pop().toLowerCase();
  let added = 0, updated = 0, skipped = 0;
  try {
    // 既存データを全取得（重複チェック用）
    const existing = await getAllItemsAll();

    const upsertItem = async (tabName, title, content) => {
      // 完全一致 → スキップ
      const exact = existing.find(i => i.tab === tabName && i.title === title && i.content === content);
      if (exact) { skipped++; return; }
      // タイトル一致（同タブ内）→ 上書き
      const same = existing.find(i => i.tab === tabName && i.title === title);
      if (same) {
        await updateItemDB(same.id, title, content);
        same.content = content; // キャッシュも更新
        updated++; return;
      }
      // 新規追加
      const newId = await addItemDB(tabName, title, content);
      existing.push({ id: newId, tab: tabName, title, content });
      added++;
    };

    if (ext === 'json') {
      const data = JSON.parse(text);
      for (const [tabName, itms] of Object.entries(data)) {
        if (!tabs.includes(tabName)) { tabs.push(tabName); }
        for (const item of (itms || [])) {
          await upsertItem(tabName, item.title || '', item.content || '');
        }
      }
      await saveTabsDB(tabs);
    } else if (ext === 'csv') {
      const lines = text.replace(/^\uFEFF/, '').split('\n').filter(l => l.trim());
      const start = (lines[0].includes('タブ') || lines[0].toLowerCase().includes('tab')) ? 1 : 0;
      for (const line of lines.slice(start)) {
        const cols = parseCsvLine(line);
        if (cols.length < 3) continue;
        const [tabName, title, content] = cols;
        if (!tabName.trim()) continue;
        if (!tabs.includes(tabName)) { tabs.push(tabName); }
        await upsertItem(tabName, title, content);
      }
      await saveTabsDB(tabs);
    } else {
      showToast('JSONまたはCSVファイルを選んでください'); return;
    }

    closeModal('importModal');
    document.getElementById('importFile').value = '';
    await loadTabs();
    const msg = [`追加 ${added}件`];
    if (updated) msg.push(`更新 ${updated}件`);
    if (skipped) msg.push(`重複スキップ ${skipped}件`);
    showToast(msg.join(' ／ '));
  } catch(e) {
    showToast('読み込みエラー: ' + e.message);
  }
}
  } catch(e) {
    showToast('読み込みエラー: ' + e.message);
  }
}

function parseCsvLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

// ===== タッチソート（タブ）- 長押しで発動 =====
function setupTabTouchSort(bar) {
  let dragging = null, longPressTimer = null, startX = 0;
  const LONG_PRESS = 500; // ms

  bar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      longPressTimer = setTimeout(() => {
        dragging = btn;
        btn.style.opacity = '0.5';
        // 長押し開始をフィードバック
        if (navigator.vibrate) navigator.vibrate(30);
      }, LONG_PRESS);
    }, { passive: true });

    btn.addEventListener('touchmove', e => {
      const dx = Math.abs(e.touches[0].clientX - startX);
      // 少しでも動いたら長押しキャンセル（通常スクロール優先）
      if (dx > 5) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        if (!dragging) return;
      }
      if (!dragging) return;
      e.preventDefault();
      const tx = e.touches[0].clientX;
      const allBtns = [...bar.querySelectorAll('.tab-btn')];
      allBtns.forEach(b => b.classList.remove('drag-over-left','drag-over-right'));
      const target = allBtns.find(b => {
        const r = b.getBoundingClientRect();
        return tx >= r.left && tx <= r.right && b !== dragging;
      });
      if (target) {
        const r = target.getBoundingClientRect();
        target.classList.add(tx < r.left + r.width / 2 ? 'drag-over-left' : 'drag-over-right');
      }
    }, { passive: false });

    btn.addEventListener('touchend', async e => {
      clearTimeout(longPressTimer);
      longPressTimer = null;
      if (!dragging) return;
      dragging.style.opacity = '';
      const tx = e.changedTouches[0].clientX;
      const allBtns = [...bar.querySelectorAll('.tab-btn')];
      allBtns.forEach(b => b.classList.remove('drag-over-left','drag-over-right'));
      const target = allBtns.find(b => {
        const r = b.getBoundingClientRect();
        return tx >= r.left && tx <= r.right && b !== dragging;
      });
      if (target) {
        const dragName = dragging.dataset.tab;
        const targetName = target.dataset.tab;
        const rect = target.getBoundingClientRect();
        const fromIdx = tabs.indexOf(dragName);
        tabs.splice(fromIdx, 1);
        let toIdx = tabs.indexOf(targetName);
        if (tx >= rect.left + rect.width / 2) toIdx += 1;
        tabs.splice(toIdx, 0, dragName);
        await saveTabsDB(tabs);
        renderTabs();
        showToast('タブを並び替えました');
      }
      dragging = null;
    });

    btn.addEventListener('touchcancel', () => {
      clearTimeout(longPressTimer);
      longPressTimer = null;
      if (dragging) { dragging.style.opacity = ''; dragging = null; }
      bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('drag-over-left','drag-over-right'));
    });
  });
}

// ===== タッチソート（行） =====
function setupRowTouchSort(container) {
  let draggingRow = null, ghost = null, startY = 0, scrollArea = document.getElementById('scrollArea');

  container.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('touchstart', e => {
      e.stopPropagation();
      draggingRow = handle.closest('.item-row');
      startY = e.touches[0].clientY;
      draggingRow.classList.add('dragging');

      // ゴースト（視覚的なコピー）
      ghost = draggingRow.cloneNode(true);
      ghost.style.cssText = `position:fixed;left:${draggingRow.getBoundingClientRect().left}px;top:${draggingRow.getBoundingClientRect().top}px;width:${draggingRow.offsetWidth}px;opacity:0.7;pointer-events:none;z-index:999;background:white;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.18);`;
      document.body.appendChild(ghost);
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (!draggingRow || !ghost) return;
      e.preventDefault();
      const ty = e.touches[0].clientY;
      const dy = ty - startY;
      const origTop = draggingRow.getBoundingClientRect().top;
      ghost.style.top = (origTop + dy) + 'px';

      const rows = [...container.querySelectorAll('.item-row:not(.dragging)')];
      rows.forEach(r => r.classList.remove('drag-over-top','drag-over-bottom'));
      const over = rows.find(r => {
        const rect = r.getBoundingClientRect();
        return ty >= rect.top && ty <= rect.bottom;
      });
      if (over) {
        const rect = over.getBoundingClientRect();
        over.classList.add(ty < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
      }
    }, { passive: false });

    handle.addEventListener('touchend', async e => {
      if (!draggingRow) return;
      const ty = e.changedTouches[0].clientY;
      draggingRow.classList.remove('dragging');
      if (ghost) { ghost.remove(); ghost = null; }

      const rows = [...container.querySelectorAll('.item-row:not(.dragging)')];
      rows.forEach(r => r.classList.remove('drag-over-top','drag-over-bottom'));

      const over = rows.find(r => {
        const rect = r.getBoundingClientRect();
        return ty >= rect.top && ty <= rect.bottom;
      });

      if (over && over !== draggingRow) {
        const fromId = parseInt(draggingRow.dataset.id);
        const toId = parseInt(over.dataset.id);
        const list = isSearching ? searchResults : items;
        const fromIdx = list.findIndex(i => i.id === fromId);
        const toItemRect = over.getBoundingClientRect();
        const moved = list.splice(fromIdx, 1)[0];
        let toIdx = list.findIndex(i => i.id === toId);
        if (ty >= toItemRect.top + toItemRect.height / 2) toIdx += 1;
        list.splice(toIdx, 0, moved);
        if (!isSearching) items = list; else searchResults = list;
        await saveItemOrder(list);
        renderItems(list, isSearching);
      }
      draggingRow = null;
    });
  });
}

// ===== トースト =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== ユーティリティ =====
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
function escH(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
